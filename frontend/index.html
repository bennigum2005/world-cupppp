<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>2026 World Cup Predictor</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header class="hdr">
  <div class="logo">
    <div class="logo-ball">⚽</div>
    <div><h1>2026 World Cup Predictor</h1><p>Pick your bracket — see who called it right</p></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="btn" id="logout-btn" onclick="logout()" style="font-size:11px;display:none;">Log out</button>
  </div>
</header>

<nav class="nav">
  <div class="ntab active" onclick="showTab('bracket',this)">My Picks</div>
  <div class="ntab" onclick="showTab('leaderboard',this)">🏆 Leaderboard</div>
  <div class="ntab" id="tab-entries" onclick="showTab('entries',this)" style="display:none;">Entries</div>
</nav>

<div class="app">

  <!-- ADMIN BAR -->
  <div class="abar" id="abar">
    <div class="albl">⚙ Admin</div>
    <div class="aacts">
      <label style="font-size:11px;color:var(--t2);">Active round:</label>
      <select id="round-selector" class="btn" style="font-size:11px;padding:6px 10px;" onchange="setActiveRound(this.value)">
        <option value="r32">Round of 32</option>
        <option value="r16">Round of 16</option>
        <option value="qf">Quarter-finals</option>
        <option value="sf">Semi-finals</option>
        <option value="third">3rd Place</option>
        <option value="final">Final</option>
      </select>
      <button class="btn btn-p" onclick="startTournament()">🚀 Lock all picks</button>
      <button class="btn" onclick="stopTournament()">Reopen picks</button>
      <button class="btn" onclick="manualSync()" id="sync-btn">↻ Sync results</button>
      <span id="sync-status" style="font-size:11px;color:var(--t2);"></span>
      <button class="btn btn-d" onclick="adminResetMyPicks()" style="margin-left:auto;">Reset my picks</button>
      <button class="btn" onclick="adminLogout()">Admin logout</button>
    </div>
  </div>

  <!-- MY PICKS TAB -->
  <div class="panel active" id="panel-bracket"></div>

  <!-- LEADERBOARD TAB -->
  <div class="panel" id="panel-leaderboard"></div>

  <!-- ENTRIES TAB (admin) -->
  <div class="panel" id="panel-entries"></div>

</div>
<script src="app.js"></script>
</body>
</html>
