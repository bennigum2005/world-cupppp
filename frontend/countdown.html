<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>HM Leikur Jóa Útherja</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:#fff;
      display:flex;flex-direction:column;
      align-items:center;justify-content:flex-end;
      min-height:100vh;min-height:100dvh;
      text-align:center;
      padding:0 20px 11vh;
      /* PC: wide World Cup image — show the whole poster, no crop */
      background:#0a0e14 url('countdown_pc.jpg') center/contain no-repeat fixed;
    }
    /* Phone: portrait poster you sent */
    @media (max-width:700px){
      body{ background-image:url('countdown_bg.jpg'); padding-bottom:9vh; }
    }

    .clock{
      display:flex;gap:clamp(8px,2.5vw,34px);
      align-items:flex-start;justify-content:center;
      padding:clamp(14px,2.2vh,22px) clamp(16px,3vw,30px);
      border-radius:18px;
      background:rgba(6,11,20,.42);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
    }
    .unit{display:flex;flex-direction:column;align-items:center;min-width:clamp(56px,17vw,128px);}
    .num{
      font-variant-numeric:tabular-nums;
      font-size:clamp(42px,14vw,112px);
      font-weight:800;line-height:1;
      color:#ffd24a;
      text-shadow:0 2px 12px rgba(0,0,0,.9), 0 0 34px rgba(255,200,70,.45);
    }
    .lbl{
      margin-top:clamp(8px,1.5vh,16px);
      font-size:clamp(9px,2.4vw,13px);
      letter-spacing:.2em;text-transform:uppercase;
      color:#f2e6c4;
      text-shadow:0 1px 8px rgba(0,0,0,.9);
    }
    .done{
      font-size:clamp(22px,6vw,44px);font-weight:800;
      color:#ffd24a;letter-spacing:.1em;
      text-shadow:0 2px 18px rgba(0,0,0,.9);
    }
  </style>
</head>
<body>
  <div class="clock" id="clock">
    <div class="unit"><span class="num" id="d">--</span><span class="lbl">Dagar</span></div>
    <div class="unit"><span class="num" id="h">--</span><span class="lbl">Klst</span></div>
    <div class="unit"><span class="num" id="m">--</span><span class="lbl">Mín</span></div>
    <div class="unit"><span class="num" id="s">--</span><span class="lbl">Sek</span></div>
  </div>

  <script>
    var TARGET = Date.parse('2026-06-28T05:00:00Z'); // 05:00 GMT, Sun Jun 28 2026
    function pad(n){return (n<10?'0':'')+n;}
    function tick(){
      var diff = TARGET - Date.now();
      if (diff <= 0){
        document.getElementById('clock').innerHTML =
          '<div class="done">Leikurinn er opinn!</div>';
        setTimeout(function(){ location.reload(); }, 1500);
        return;
      }
      var s = Math.floor(diff/1000);
      document.getElementById('d').textContent = Math.floor(s/86400);
      document.getElementById('h').textContent = pad(Math.floor(s%86400/3600));
      document.getElementById('m').textContent = pad(Math.floor(s%3600/60));
      document.getElementById('s').textContent = pad(s%60);
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
