<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>HM Leikur Jóa Útherja</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:#fff;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;min-height:100dvh;
      text-align:center;padding:24px;
      /* PC: old dark background */
      background:#0a0e14 url('bg.jpg') center/cover no-repeat fixed;
    }

    /* Phone: new portrait background */
    @media (max-width:700px){
      body{ background-image:url('countdown_mobile.jpg'); }
      .title{ display:none; }            /* phone image already has the title */
      .clock{ margin-top:34vh; }         /* sit over the field, below the artwork */
    }

    .title{
      font-size:clamp(15px,3.5vw,24px);
      letter-spacing:.28em;text-transform:uppercase;
      color:#ffd24a;font-weight:800;
      margin-bottom:clamp(24px,6vh,56px);
      text-shadow:0 2px 18px rgba(0,0,0,.85);
    }
    .clock{
      display:flex;gap:clamp(10px,3vw,40px);
      align-items:flex-start;justify-content:center;
    }
    .unit{display:flex;flex-direction:column;align-items:center;min-width:clamp(58px,18vw,140px);}
    .num{
      font-variant-numeric:tabular-nums;
      font-size:clamp(44px,15vw,120px);
      font-weight:800;line-height:1;
      color:#ffd24a;
      text-shadow:0 2px 12px rgba(0,0,0,.9), 0 0 34px rgba(255,200,70,.45);
    }
    .lbl{
      margin-top:clamp(8px,1.5vh,16px);
      font-size:clamp(9px,2.4vw,13px);
      letter-spacing:.2em;text-transform:uppercase;
      color:#f2e6c4;
      text-shadow:0 1px 8px rgba(0,0,0,.9);
    }
    .done{
      font-size:clamp(22px,6vw,44px);font-weight:800;
      color:#ffd24a;letter-spacing:.1em;
      text-shadow:0 2px 18px rgba(0,0,0,.9);
    }
  </style>
</head>
<body>
  <div class="title">HM Leikur Jóa Útherja</div>
  <div class="clock" id="clock">
    <div class="unit"><span class="num" id="d">--</span><span class="lbl">Dagar</span></div>
    <div class="unit"><span class="num" id="h">--</span><span class="lbl">Klst</span></div>
    <div class="unit"><span class="num" id="m">--</span><span class="lbl">Mín</span></div>
    <div class="unit"><span class="num" id="s">--</span><span class="lbl">Sek</span></div>
  </div>

  <script>
    var TARGET = Date.parse('2026-06-28T05:00:00Z'); // 05:00 GMT, Sun Jun 28 2026
    function pad(n){return (n<10?'0':'')+n;}
    function tick(){
      var diff = TARGET - Date.now();
      if (diff <= 0){
        document.getElementById('clock').innerHTML =
          '<div class="done">Leikurinn er opinn!</div>';
        setTimeout(function(){ location.reload(); }, 1500);
        return;
      }
      var s = Math.floor(diff/1000);
      document.getElementById('d').textContent = Math.floor(s/86400);
      document.getElementById('h').textContent = pad(Math.floor(s%86400/3600));
      document.getElementById('m').textContent = pad(Math.floor(s%3600/60));
      document.getElementById('s').textContent = pad(s%60);
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
