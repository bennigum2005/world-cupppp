<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>HM Leikur Jóa Útherja</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#000;overflow:hidden;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:#fff;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;min-height:100dvh;
      text-align:center;padding:24px;
    }
    .title{
      font-size:clamp(14px,3.5vw,22px);
      letter-spacing:.28em;text-transform:uppercase;
      color:#c9a84c;font-weight:700;
      margin-bottom:clamp(24px,6vh,56px);
    }
    .clock{
      display:flex;gap:clamp(10px,3vw,40px);
      align-items:flex-start;justify-content:center;
    }
    .unit{display:flex;flex-direction:column;align-items:center;min-width:clamp(56px,18vw,140px);}
    .num{
      font-variant-numeric:tabular-nums;
      font-size:clamp(40px,15vw,120px);
      font-weight:800;line-height:1;color:#fff;
    }
    .lbl{
      margin-top:clamp(8px,1.5vh,16px);
      font-size:clamp(9px,2.4vw,13px);
      letter-spacing:.2em;text-transform:uppercase;color:#7a7a7a;
    }
    .done{font-size:clamp(20px,6vw,40px);font-weight:800;color:#c9a84c;letter-spacing:.1em;}
  </style>
</head>
<body>
  <div class="title">HM Leikur Jóa Útherja</div>
  <div class="clock" id="clock">
    <div class="unit"><span class="num" id="d">--</span><span class="lbl">Dagar</span></div>
    <div class="unit"><span class="num" id="h">--</span><span class="lbl">Klst</span></div>
    <div class="unit"><span class="num" id="m">--</span><span class="lbl">Mín</span></div>
    <div class="unit"><span class="num" id="s">--</span><span class="lbl">Sek</span></div>
  </div>

  <script>
    var TARGET = Date.parse('2026-06-28T05:00:00Z'); // 05:00 GMT, Sun Jun 28 2026
    function pad(n){return (n<10?'0':'')+n;}
    function tick(){
      var diff = TARGET - Date.now();
      if (diff <= 0){
        document.getElementById('clock').innerHTML =
          '<div class="done">Leikurinn er opinn!</div>';
        setTimeout(function(){ location.reload(); }, 1500);
        return;
      }
      var s = Math.floor(diff/1000);
      document.getElementById('d').textContent = Math.floor(s/86400);
      document.getElementById('h').textContent = pad(Math.floor(s%86400/3600));
      document.getElementById('m').textContent = pad(Math.floor(s%3600/60));
      document.getElementById('s').textContent = pad(s%60);
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
