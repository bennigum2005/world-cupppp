<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HM Leikur Jóa Útherja</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-btn-wrap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 8vh;
      display: flex;
      justify-content: center;
      z-index: 2;
    }

    .btn-start {
      font-family: inherit;
      font-size: clamp(16px, 2.2vw, 26px);
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #1a0e00;
      background: linear-gradient(135deg, #f0c84a 0%, #c9a84c 50%, #e8b84b 100%);
      border: none;
      border-radius: 6px;
      padding: clamp(14px, 2vh, 22px) clamp(40px, 6vw, 90px);
      cursor: pointer;
      box-shadow:
        0 0 30px rgba(201,168,76,0.6),
        0 4px 24px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
    }

    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-start:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 0 50px rgba(201,168,76,0.8),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .btn-start:active {
      transform: translateY(0) scale(0.98);
    }
  </style>
</head>
<body>
  <div class="hero">
    <picture>
      <source media="(max-width: 600px)" srcset="hero_mobile.jpg">
      <img class="hero-img" src="hero.jpg" alt="HM Leikur" fetchpriority="high">
    </picture>
    <div class="hero-btn-wrap">
      <button class="btn-start" onclick="window.location.href='/login'">HEFJA LEIK</button>
    </div>
  </div>
</body>
</html>
