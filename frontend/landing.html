<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8"/>
  <script>(function(){var L=Date.parse('2026-06-28T05:00:00Z');if(Date.now()<L&&document.cookie.indexOf('wc_access=')===-1&&!/countdown/.test(location.pathname)){location.replace('/countdown.html');}})();</script>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HM Leikur Jóa Útherja</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      /* PC background */
      background: #0a0e14 url('hero.jpg') center/cover no-repeat;
    }
    /* Phone background — the portrait poster */
    @media (max-width: 700px) {
      .hero { background-image: url('countdown_bg.jpg'); }
    }

    .hero-btn-wrap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 10vh;
      bottom: 10dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 2;
    }

    .cd { display: flex; gap: clamp(10px,3vw,22px); justify-content: center; }
    .cd-unit { display: flex; flex-direction: column; align-items: center; min-width: clamp(48px,13vw,72px); }
    .cd-num {
      font-size: clamp(28px,7vw,52px); font-weight: 800; line-height: 1;
      color: #ffd24a; font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 12px rgba(0,0,0,.9), 0 0 26px rgba(255,200,70,.4);
    }
    .cd-lbl {
      margin-top: 6px; font-size: clamp(8px,2vw,11px); letter-spacing: .18em;
      text-transform: uppercase; color: #f2e6c4; text-shadow: 0 1px 6px rgba(0,0,0,.9);
    }

    .btn-start {
      font-family: inherit;
      font-size: clamp(16px, 2.2vw, 26px);
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #1a0e00;
      background: linear-gradient(135deg, #f0c84a 0%, #c9a84c 50%, #e8b84b 100%);
      border: none;
      border-radius: 6px;
      padding: clamp(14px, 2vh, 22px) clamp(40px, 6vw, 90px);
      cursor: pointer;
      box-shadow:
        0 0 30px rgba(201,168,76,0.6),
        0 4px 24px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
    }

    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-start:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 0 50px rgba(201,168,76,0.8),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .btn-start:active {
      transform: translateY(0) scale(0.98);
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-btn-wrap">
      <div class="cd" id="cd">
        <div class="cd-unit"><span class="cd-num" id="cd-d">--</span><span class="cd-lbl">Dagar</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-h">--</span><span class="cd-lbl">Klst</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-m">--</span><span class="cd-lbl">Mín</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-s">--</span><span class="cd-lbl">Sek</span></div>
      </div>
      <button class="btn-start" onclick="window.location.href='/login'">Innskráning / Hefja leik</button>
    </div>
  </div>

  <script>
    /* ▼▼ SET YOUR COUNTDOWN DATE/TIME HERE (GMT) ▼▼ */
    var CD_TARGET = Date.parse('2026-06-28T05:00:00Z');
    function pad(n){ return (n<10?'0':'')+n; }
    function cdTick(){
      var cd = document.getElementById('cd');
      var diff = CD_TARGET - Date.now();
      if (diff <= 0){ if(cd) cd.style.display='none'; return; }   // hide once it hits zero
      var s = Math.floor(diff/1000);
      document.getElementById('cd-d').textContent = Math.floor(s/86400);
      document.getElementById('cd-h').textContent = pad(Math.floor(s%86400/3600));
      document.getElementById('cd-m').textContent = pad(Math.floor(s%3600/60));
      document.getElementById('cd-s').textContent = pad(s%60);
    }
    cdTick(); setInterval(cdTick, 1000);
  </script>
</body>
</html>
